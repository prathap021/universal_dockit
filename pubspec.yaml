name: universal_dockit
description: "A Flutter plugin for native document viewing on Android and iOS. Supports PDF, Word, Excel, PowerPoint, TXT, CSV, RTF, and OpenDocument formats via open-source native SDKs."
version: 1.0.0
homepage: https://github.com/example/universal_dockit

environment:
  sdk: ^3.0.0
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.universal_dockit
        pluginClass: UniversalDockitPlugin
      ios:
        pluginClass: UniversalDockitPlugin
